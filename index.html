<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Image Enhancer</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 30px;
}

h1 {
  font-size: 2.8rem;
  margin-bottom: 5px;
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #6366f1; }
  to { text-shadow: 0 0 25px #8b5cf6; }
}

.tagline {
  font-size: 1.2rem;
  color: #cbd5f5;
  opacity: 0;
  animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.upload-box {
  border: 2px dashed #6366f1;
  padding: 30px;
  border-radius: 15px;
  cursor: pointer;
  margin: 25px 0;
  transition: 0.3s;
}

.upload-box:hover {
  background: rgba(99,102,241,0.1);
  transform: scale(1.02);
}

input {
  display: none;
}

.controls {
  margin: 10px 0;
}

select, button {
  padding: 10px 15px;
  border-radius: 8px;
  border: none;
  margin: 5px;
}

button {
  background: #6366f1;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.preview {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  margin-top: 30px;
  flex-wrap: wrap;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  flex: 1;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

img {
  max-width: 100%;
  border-radius: 10px;
}

.loader {
  display: none;
  margin-top: 20px;
}

.download-btn {
  display: none;
  margin-top: 20px;
  background: #22c55e;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 AI Image Enhancer</h1>
<p class="tagline">Transform your photos into stunning, professional edits instantly ✨</p>

<label class="upload-box">
  Click to upload image
  <input type="file" id="imageInput">
</label>

<div class="controls">
  <select id="style">
    <option>Normal</option>
    <option>Cinematic</option>
    <option>Sharp Pro</option>
    <option>Warm</option>
  </select>

  <button onclick="upload()">Make it Pro</button>
</div>

<div class="loader" id="loader">⏳ Enhancing your image...</div>

<div class="preview">
  <div class="card">
    <h3>Original</h3>
    <img id="inputPreview">
  </div>

  <div class="card">
    <h3>Enhanced</h3>
    <img id="output">
  </div>
</div>

<button class="download-btn" id="downloadBtn">⬇ Download Image</button>

</div>

<script>
let outputBlob;

document.getElementById("imageInput").onchange = function(e) {
  const file = e.target.files[0];
  document.getElementById("inputPreview").src = URL.createObjectURL(file);
};

async function upload() {
  const file = document.getElementById("imageInput").files[0];
  const style = document.getElementById("style").value;

  if (!file) {
    alert("Upload image first!");
    return;
  }

  document.getElementById("loader").style.display = "block";

  let formData = new FormData();
  formData.append("image", file);
  formData.append("style", style);

  const response = await fetch("https://image-enhancer-agml.onrender.com/enhance", {
    method: "POST",
    body: formData
  });

  const blob = await response.blob();
  outputBlob = blob;

  document.getElementById("output").src = URL.createObjectURL(blob);
  document.getElementById("loader").style.display = "none";
  document.getElementById("downloadBtn").style.display = "inline-block";
}

document.getElementById("downloadBtn").onclick = function() {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(outputBlob);
  a.download = "enhanced.jpg";
  a.click();
};
</script>

</body>
</html>

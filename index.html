<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-GB675LM4K0"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Image Enhancer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  text-align:center;
  padding:30px;
}

h1{
  font-size:40px;
  margin-bottom:10px;
}

p{
  color:#cbd5f5;
  margin-bottom:25px;
}

.container{
  max-width:900px;
  margin:auto;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius:20px;
  padding:30px;
}

.upload-box{
  border:2px dashed #38bdf8;
  padding:20px;
  border-radius:12px;
  cursor:pointer;
  margin-bottom:20px;
}

select,button{
  padding:10px;
  margin:10px;
  border-radius:8px;
  border:none;
}

button{
  background:#4f46e5;
  color:white;
  cursor:pointer;
}

.images{
  display:flex;
  gap:20px;
  margin-top:30px;
  justify-content:center;
  flex-wrap:wrap;
}

img{
  width:300px;
  border-radius:10px;
}

.loader{
  display:none;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>🔥 AI Image Enhancer</h1>
<p>Make your images look professional ✨</p>

<div class="container">

<div class="upload-box" onclick="document.getElementById('file').click()">
Click to upload image
</div>

<input type="file" id="file" accept="image/*" hidden>

<br>

<select id="style">
<option>Normal</option>
<option>Cinematic</option>
<option>Warm</option>
<option>Cool</option>
<option>Sharp Pro</option>
</select>

<select id="lut">
<option>None</option>
<option>Teal & Orange</option>
<option>Moody</option>
<option>Vintage</option>
<option>Cool Film</option>
<option>Soft Skin</option>
</select>

<br>

<button onclick="uploadImage()">Enhance Image</button>

<div class="loader" id="loader">Enhancing...</div>

<div class="images">
<div>
<h3>Original</h3>
<img id="original">
</div>

<div>
<h3>Enhanced</h3>
<img id="enhanced">
  <br>
<a id="downloadBtn" download="enhanced.jpg">
  <button>Download Image</button>
</a>
</div>
</div>

</div>

<script>

async function uploadImage(){

  const fileInput = document.getElementById("file");
  const file = fileInput.files[0];

  if(!file){
    alert("Upload image first");
    return;
  }

  // show original
  document.getElementById("original").src = URL.createObjectURL(file);

  // show loader
  document.getElementById("loader").style.display = "block";

  const formData = new FormData();
  formData.append("image", file);

  // SAFE values (no null error)
  const style = document.getElementById("style")?.value || "Normal";
  const lut = document.getElementById("lut")?.value || "None";

  formData.append("style", style);
  formData.append("lut", lut);

  try{
    const response = await fetch("https://image-enhancer-agml.onrender.com/enhance", {
      method: "POST",
      body: formData
    });

    if(!response.ok){
      alert("Backend error");
      document.getElementById("loader").style.display = "none";
      return;
    }

    const blob = await response.blob();
    const imageURL = URL.createObjectURL(blob);
    const enhancedImg = document.getElementById("enhanced");
const downloadBtn = document.getElementById("downloadBtn");

enhancedImg.src = imageURL;   // 👈 image show hogi
downloadBtn.href = imageURL;  // 👈 download link set hoga

    document.getElementById("downloadBtn").href = imageURL;

  }catch(error){
    alert("Error connecting backend");
  }

  document.getElementById("loader").style.display = "none";
}

</script>

</body>
</html>

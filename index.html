<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Image Enhancer</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 30px;
}

.container {
  max-width: 900px;
  margin: auto;
}

h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
}

input, select, button {
  margin: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.images {
  display: flex;
  justify-content: space-around;
  margin-top: 20px;
}

img {
  max-width: 40%;
  border-radius: 10px;
  border: 2px solid #333;
}

#loader {
  display: none;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
  <h1>AI Image Enhancer</h1>
  <p>Make your photos look professional instantly ✨</p>

  <input type="file" id="imageInput">
  
  <select id="style">
    <option>Normal</option>
    <option>Cinematic</option>
    <option>Sharp Pro</option>
    <option>Warm</option>
  </select>

  <br>
  <button onclick="upload()">Enhance Image</button>

  <p id="loader">Enhancing your image...</p>

  <div class="images">
    <div>
      <h3>Original</h3>
      <img id="inputPreview">
    </div>

    <div>
      <h3>Enhanced</h3>
      <img id="output">
    </div>
  </div>

  <br>
  <a id="downloadBtn" style="display:none;" download="enhanced.jpg">
    <button>Download</button>
  </a>
</div>

<script>
const backendURL = "https://your-render-url.onrender.com/enhance"; // 🔥 CHANGE THIS

let outputBlob = null;

// Preview input
document.getElementById("imageInput").addEventListener("change", function() {
  const file = this.files[0];
  if (file) {
    document.getElementById("inputPreview").src = URL.createObjectURL(file);
  }
});

function upload() {
  const file = document.getElementById("imageInput").files[0];
  const style = document.getElementById("style").value;

  if (!file) {
    alert("Upload image first!");
    return;
  }

  document.getElementById("loader").style.display = "block";

  let formData = new FormData();
  formData.append("image", file);
  formData.append("style", style);

  fetch(backendURL, {
    method: "POST",
    body: formData
  })
  .then(async res => {
    const type = res.headers.get("content-type");
    console.log("TYPE:", type);

    if (!type || !type.includes("image")) {
      const text = await res.text();
      alert("Backend error:\n" + text);
      throw new Error("Not an image response");
    }

    return res.blob();
  })
  .then(blob => {
    console.log("SIZE:", blob.size);

    outputBlob = blob;

    const url = URL.createObjectURL(blob);
    document.getElementById("output").src = url;

    const downloadBtn = document.getElementById("downloadBtn");
    downloadBtn.href = url;
    downloadBtn.style.display = "inline-block";
  })
  .catch(err => {
    console.error(err);
    alert("Something went wrong!");
  })
  .finally(() => {
    document.getElementById("loader").style.display = "none";
  });
}
</script>

</body>
</html>

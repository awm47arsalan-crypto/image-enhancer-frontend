<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GB675LM4K0"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-GB675LM4K0');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Image Enhancer</title>

<style>
  <select id="style">
  <option>Normal</option>
  <option>Cinematic</option>
  <option>Warm</option>
  <option>Cool</option>
  <option>Sharp Pro</option>
</select>
  <br><br>
<label>LUT Filter:</label><br>
<select id="lut">
  <option>None</option>
  <option>Teal & Orange</option>
  <option>Moody</option>
  <option>Vintage</option>
  <option>Cool Film</option>
</select>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
  padding: 30px;
}

h1 {
  font-size: 2.8rem;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #22c55e; }
  to { text-shadow: 0 0 25px #4ade80; }
}

.upload-box {
  border: 2px dashed #4ade80;
  padding: 20px;
  margin: 20px auto;
  width: 300px;
  cursor: pointer;
  transition: 0.3s;
}

.upload-box:hover {
  background: rgba(74, 222, 128, 0.1);
}

button {
  background: #22c55e;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  background: #16a34a;
}

.images {
  display: flex;
  justify-content: space-around;
  margin-top: 30px;
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 15px;
  width: 40%;
  backdrop-filter: blur(10px);
}

img {
  max-width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

#loader {
  display: none;
  margin-top: 15px;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { opacity: 0.5; }
  100% { opacity: 1; }
}
</style>
</head>

<body>

<h1>🔥 AI Image Enhancer</h1>
<p>Transform your photos into stunning edits instantly ✨</p>

<div class="upload-box" onclick="document.getElementById('file').click()">
  Click to upload image
</div>

<input type="file" id="file" hidden>

<br>

<select id="style">
  <option>Normal</option>
  <option>Cinematic</option>
  <option>Sharp Pro</option>
  <option>Warm</option>
</select>

<br><br>

<button onclick="upload()">Make it Pro</button>

<p id="loader">Enhancing your image...</p>

<div class="images">
  <div class="card">
    <h3>Original</h3>
    <img id="inputPreview">
  </div>

  <div class="card">
    <h3>Enhanced</h3>
    <img id="output">
  </div>
</div>

<br>
<a id="downloadBtn" style="display:none;" download="enhanced.jpg">
  <button>Download</button>
</a>

<script>
const backendURL = "https://image-enhancer-agml.onrender.com/enhance";

let outputBlob = null;

document.getElementById("file").addEventListener("change", function() {
  const file = this.files[0];
  if (file) {
    document.getElementById("inputPreview").src = URL.createObjectURL(file);
  }
});

function upload() {
  const file = document.getElementById("file").files[0];
  const style = document.getElementById("style").value;

  if (!file) return alert("Upload image first!");

  document.getElementById("loader").style.display = "block";

  let formData = new FormData();
  formData.append("image", file);
  formData.append("style", style);
  const lutElement = document.getElementById("lut");
formData.append("lut", lutElement ? lutElement.value : "None");

  fetch(backendURL, {
    method: "POST",
    body: formData
  })
  .then(async res => {
    const type = res.headers.get("content-type");

    if (!type.includes("image")) {
      const text = await res.text();
      alert("Backend error:\n" + text);
      throw new Error("Not image");
    }

    return res.blob();
  })
  .then(blob => {
    outputBlob = blob;
    const url = URL.createObjectURL(blob);

    document.getElementById("output").src = url;
    document.getElementById("downloadBtn").href = url;
    document.getElementById("downloadBtn").style.display = "inline-block";
  })
  .catch(err => {
    console.error(err);
    alert("Error processing image");
  })
  .finally(() => {
    document.getElementById("loader").style.display = "none";
  });
}
</script>

</body>
</html>

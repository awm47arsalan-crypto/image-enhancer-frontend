
<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-GB675LM4K0"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔥 AI Image Enhancer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      color: #fff;
      background:
        radial-gradient(circle at 20% 20%, rgba(34,197,94,0.18), transparent 35%),
        radial-gradient(circle at 80% 30%, rgba(59,130,246,0.15), transparent 35%),
        radial-gradient(circle at 50% 80%, rgba(168,85,247,0.12), transparent 40%),
        linear-gradient(135deg, #020617, #071127, #0a1730);
      padding: 40px 20px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    h1 {
      text-align: center;
      font-size: clamp(2.5rem, 6vw, 4.8rem);
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #22c55e, #4ade80, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(34, 197, 94, 0.25);
    }

    .subtitle {
      text-align: center;
      color: #cbd5e1;
      font-size: 1.1rem;
      margin-bottom: 35px;
    }

    .upload-box {
      max-width: 520px;
      margin: 0 auto 24px;
      padding: 34px;
      text-align: center;
      border: 2px dashed rgba(74, 222, 128, 0.6);
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.55);
      backdrop-filter: blur(16px);
      cursor: pointer;
      transition: 0.3s;
    }

    .upload-box:hover {
      border-color: #4ade80;
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(74, 222, 128, 0.15);
    }

    .upload-box p {
      color: #dbeafe;
      font-size: 1.05rem;
    }

    input[type="file"] {
      display: none;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    select {
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      outline: none;
      font-size: 1rem;
      min-width: 220px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 13px 28px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .enhance-btn {
      background: linear-gradient(90deg, #22c55e, #4ade80);
      color: #fff;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.35);
    }

    .enhance-btn:hover,
    .download-btn:hover {
      transform: scale(1.05);
    }

    .download-btn {
      display: none;
      margin: 18px auto 0;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      color: white;
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.35);
    }

    .loader {
      display: none;
      width: 42px;
      height: 42px;
      border: 4px solid rgba(255,255,255,0.12);
      border-top: 4px solid #4ade80;
      border-radius: 50%;
      margin: 0 auto 15px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 25px;
      min-height: 24px;
    }

    .images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 28px;
    }

    .card {
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }

    .card h3 {
      text-align: center;
      margin-bottom: 16px;
      font-size: 1.6rem;
      font-weight: 700;
    }

    .preview {
      width: 100%; 
      max-height: 520px;
      min-height: 260px;
      object-fit: contain;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      color: #94a3b8;
    }

    @media (max-width: 640px) {
      body {
        padding: 24px 14px;
      }

      .upload-box {
        padding: 26px 18px;
      }

      .card {
        padding: 18px;
      }

      .card h3 {
        font-size: 1.35rem;
      }

      select {
        min-width: 100%; 
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔥 AI Image Enhancer</h1>
    <p class="subtitle">Transform your photos into stunning, professional edits instantly ✨</p>

    <div class="upload-box" onclick="document.getElementById('file').click()">
      <p>Click to upload image</p>
    </div>

    <input
      type="file"
      id="file"
      accept="image/*"
      onchange="previewImage(event)"
    />

    <div class="controls">
      <select id="mode">
        <option value="normal">Normal</option>
        <option value="cinematic">Cinematic LUT</option>
        <option value="portrait">Portrait LUT</option>
        <option value="vivid">Vivid LUT</option>
        <option value="warm">Warm Tone LUT</option>
        <option value="cool">Cool Tone LUT</option>
        <option value="moody">Moody LUT</option>
        <option value="golden">Golden Hour LUT</option>
        <option value="teal_orange">Teal & Orange LUT</option>
        <option value="black_white">Black & White</option>
      </select>

      <button class="enhance-btn" onclick="uploadImage()">
        Make it Pro
      </button>
    </div>

    <div class="loader" id="loader"></div>
    <div class="status" id="status"></div>

    <div class="images">
      <div class="card">
        <h3>Original</h3>
        <img id="original" class="preview" alt="Original Preview">
      </div>

      <div class="card">
        <h3>Enhanced</h3>
        <img id="enhanced" class="preview" alt="Enhanced Preview">

        <button
          id="downloadBtn"
          class="download-btn"
          onclick="downloadEnhancedImage()"
        >
          Download Image
        </button>
      </div>
    </div>

    <p class="footer">Created by Arsalan Ansari 🚀</p>
  </div>

  <script>
    const API_URL = "https://image-enhancer-agml.onrender.com/enhance";

    let enhancedImageURL = "";

    function previewImage(event) {
      const file = event.target.files[0];
      if (!file) return;

      const imageURL = URL.createObjectURL(file);
      document.getElementById("original").src = imageURL;

      document.getElementById("enhanced").src = "";
      document.getElementById("downloadBtn").style.display = "none";
      document.getElementById("status").textContent = "";
      enhancedImageURL = "";
    }

    async function uploadImage() {
      const fileInput = document.getElementById("file");
      const file = fileInput.files[0];

      if (!file) {
        alert("Please upload an image first.");
        return;
      }

      const mode = document.getElementById("mode").value;
      const formData = new FormData();
      formData.append("image", file);
      formData.append("mode", mode);

      const loader = document.getElementById("loader");
      const status = document.getElementById("status");
      const downloadBtn = document.getElementById("downloadBtn");

      loader.style.display = "block";
      status.textContent = "Enhancing your image...";
      downloadBtn.style.display = "none";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(errorText || "Backend error");
        }

        const blob = await response.blob();
        const imageURL = URL.createObjectURL(blob);

        enhancedImageURL = imageURL;
        document.getElementById("enhanced").src = imageURL;

        downloadBtn.style.display = "inline-block";
        status.textContent = "Image enhanced successfully!";
      } catch (error) {
        console.error(error);
        alert("Backend error: " + error.message);
        status.textContent = "Failed to enhance image.";
      } finally {
        loader.style.display = "none";
      }
    }

function downloadEnhancedImage() {
  if (!enhancedImageURL) {
    alert("No enhanced image available.");
    return;
  }

  // Mobile browsers (Instagram, Facebook, etc.)
  if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
    window.open(enhancedImageURL, "_blank");
    return;
  }

  // Desktop browsers
  const link = document.createElement("a");
  link.href = enhancedImageURL;
  link.download = "enhanced-image.jpg";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
  </script>
</body>
</html>
